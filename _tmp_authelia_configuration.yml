---
theme: dark
server:
  address: tcp://0.0.0.0:9091/
  buffers:
    read: 8192
    write: 8192
  endpoints:
    authz:
      forward-auth:
        implementation: ForwardAuth
    enable_pprof: false
    enable_expvars: false
  timeouts:
    read: 30s
    write: 30s
    idle: 120s

log:
  level: info
  format: text

telemetry:
  metrics:
    enabled: true
    address: tcp://0.0.0.0:9959

totp:
  issuer: datamancy.net
  period: 30
  skew: 1

authentication_backend:
  refresh_interval: 5m
  password_reset:
    disable: false
  ldap:
    implementation: custom
    address: ldap://ldap:389
    timeout: 5s
    start_tls: false
    base_dn: dc=datamancy,dc=net
    additional_users_dn: ou=users
    users_filter: (&({username_attribute}={input})(objectClass=inetOrgPerson))
    additional_groups_dn: ou=groups
    groups_filter: (&(member={dn})(objectClass=groupOfNames))
    attributes:
      username: uid
      group_name: cn
      mail: mail
      display_name: displayName
    user: cn=admin,dc=datamancy,dc=net

access_control:
  default_policy: deny
  rules:
    - domain: auth.datamancy.net
      policy: bypass
    - domain_regex: '^(authelia|authelia:[0-9]+)$'
      policy: bypass
    - domain: homeassistant.datamancy.net
      policy: bypass
      resources:
        - "^/api/webhook/.*$"
    # Vault UI - Admin only (sensitive operations)
    - domain: vault.datamancy.net
      policy: one_factor
      subject:
        - "group:admins"
    - domain: qbittorrent.datamancy.net
      policy: one_factor
    - domain: datamancy.net
      policy: one_factor
      subject:
        - "group:admins"
        - "group:operators"
        - "group:users"
    - domain: "*.datamancy.net"
      policy: one_factor
      subject:
        - "group:admins"
        - "group:operators"
        - "group:users"

session:
  cookies:
    - domain: datamancy.net
      name: authelia_session
      authelia_url: https://auth.datamancy.net
      same_site: lax
      expiration: 8h
      inactivity: 1h
  remember_me: 7d
  redis:
    host: valkey
    port: 6379
    username: authelia
    database_index: 0

regulation:
  max_retries: 5
  find_time: 2m
  ban_time: 5m

identity_validation:
  reset_password:
    jwt_secret: b12c0fa23fa01e24102d3796f14c27e1761ccfb4a1df87988ea85ce308d0b27f

storage:
  encryption_key: 0007caa0d1e47f2ec4e7ec72137277eca957e52c52cd4c52c5f99fa667c852c0
  postgres:
    address: tcp://postgres:5432
    database: authelia
    schema: public
    username: authelia
    timeout: 5s

notifier:
  disable_startup_check: true
  filesystem:
    filename: /config/notification.txt

