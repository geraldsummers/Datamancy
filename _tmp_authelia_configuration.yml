    hmac_secret: ab7f0161564c586ae1b053ea67499def88274783476922311024dcb39fe5fcbb
    lifespans:
      access_token: 1h
      authorize_code: 1m
      id_token: 1h
      refresh_token: 90m
    enable_client_debug_messages: false
    enforce_pkce: public_clients_only
    cors:
