services:
  test-runner-security:
    build:
      context: .
      dockerfile: ./tests.containers/test-runner/Dockerfile
    image: datamancy/test-runner:local-build
    pull_policy: build
    container_name: test-runner-security
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

    environment:
      DOMAIN: ${DOMAIN}
      BASE_URL: https://${DOMAIN}
      AUTHELIA_URL: https://auth.${DOMAIN}
      LDAP_URL: ldap://ldap:389
      LDAP_BASE_DN: ${LDAP_BASE_DN}
      LDAP_ADMIN_DN: ${LDAP_ADMIN_USER}
      LDAP_ADMIN_PASSWORD: ${LDAP_ADMIN_PASSWORD}
      STACK_ADMIN_USER: ${STACK_ADMIN_USER}
      STACK_ADMIN_PASSWORD: ${STACK_ADMIN_PASSWORD}
      STACK_ADMIN_EMAIL: ${STACK_ADMIN_EMAIL}

    tmpfs:
      - /tmp
    networks:
      - default
      - internet
      - postgres
      - mariadb
      - qdrant
      - valkey
      - ldap
      - authelia
      - mailserver
      - memcached
      - docker-proxy
      - caddy
      - ai
      - litellm
      - monitoring
      - mastodon-internal
      - matrix-internal
      - trading
