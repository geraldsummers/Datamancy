services:
  volume-init:
    image: alpine:latest
    container_name: volume-init
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "=== Volume Init: Creating bind mount directories ==="
        mkdir -p /mnt/vector_root/qdrant
        mkdir -p /mnt/market_root/market-postgres
        mkdir -p ${QBITTORRENT_DATA_ROOT}
        mkdir -p ${SEAFILE_MEDIA_ROOT}
        echo "Setting permissions..."
        chmod 755 /mnt/vector_root/qdrant
        chmod 755 /mnt/market_root/market-postgres
        chmod 755 ${QBITTORRENT_DATA_ROOT}
        chmod 755 ${SEAFILE_MEDIA_ROOT}
        echo "✓ Volume directories initialized successfully"
    volumes:
      - ${VECTOR_DB_ROOT}:/mnt/vector_root:rw
      - ${MARKET_DB_ROOT}:/mnt/market_root:rw
      - ${QBITTORRENT_DATA_ROOT}:${QBITTORRENT_DATA_ROOT}:rw
      - ${SEAFILE_MEDIA_ROOT}:${SEAFILE_MEDIA_ROOT}:rw
      - ${NOCOW_DB_DIR}:${NOCOW_DB_DIR}:rw
