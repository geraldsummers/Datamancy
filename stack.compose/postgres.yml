services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: postgres
    restart: unless-stopped
    networks:
      - postgres
    environment:
      POSTGRES_USER: ${POSTGRES_ADMIN_USER}
      POSTGRES_DB: postgres
    volumes:
      - ${NOCOW_DB_DIR}/postgres:/var/lib/postgresql/data
      - ./configs/postgres/init-db.sh:/docker-entrypoint-initdb.d/01-init-db.sh:ro
      - ./configs/postgres/roundcube-schema.sql:/docker-entrypoint-initdb.d/02-roundcube-schema.sql:ro
      - ./configs/postgres/init-market-data-schema.sql:/docker-entrypoint-initdb.d/init-market-data-schema.sql:ro
    command: postgres -c 'max_connections=300' -c 'shared_buffers=1GB' -c 'max_worker_processes=16' -c 'max_parallel_workers=8'
    healthcheck:
      test:
        - CMD-SHELL
        - |
          pg_isready -U ${POSTGRES_ADMIN_USER} -t 1 && \
          psql -U ${POSTGRES_ADMIN_USER} -d postgres -t -c 'SELECT 1' > /dev/null
      interval: 60s
      timeout: 10s
      retries: 20
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
