services:
  planka:
    image: ghcr.io/plankanban/planka:1.26.3
    container_name: planka
    restart: unless-stopped
    networks:
      caddy:
        aliases:
          - planka.${DOMAIN}
      postgres:
        aliases:
          - planka.${DOMAIN}
      authelia:
        aliases:
          - planka.${DOMAIN}
    depends_on:
      caddy:
        condition: service_healthy
      postgres:
        condition: service_healthy
        restart: true
    environment:
      BASE_URL: https://planka.${DOMAIN}
      DATABASE_URL: postgresql://planka:${POSTGRES_PLANKA_PASSWORD}@postgres:5432/planka
      OIDC_ISSUER: https://auth.${DOMAIN}
      OIDC_CLIENT_ID: planka
      OIDC_SCOPES: openid profile email groups
      OIDC_ADMIN_ROLES: admins,users
      OIDC_EMAIL_ATTRIBUTE: email
      OIDC_NAME_ATTRIBUTE: name
      OIDC_USERNAME_ATTRIBUTE: preferred_username
      OIDC_REDIRECT_URI: https://planka.${DOMAIN}/oidc-callback
      OIDC_AUTHORIZATION_ENDPOINT: https://auth.${DOMAIN}/api/oidc/authorization
      OIDC_TOKEN_ENDPOINT: https://auth.${DOMAIN}/api/oidc/token
      OIDC_USERINFO_ENDPOINT: https://auth.${DOMAIN}/api/oidc/userinfo
      OIDC_TOKEN_ENDPOINT_AUTH_METHOD: client_secret_basic
      OIDC_ENFORCED: false
      NODE_EXTRA_CA_CERTS: /ca/caddy-ca.crt
      SSL_CERT_FILE: /ca/caddy-ca.crt
    volumes:
      - planka_data:/app/public/user-avatars
      - caddy_ca:/ca:ro
    healthcheck:
      test:
        - CMD-SHELL
        - |
          wget --quiet --tries=1 --spider http://localhost:1337/ || \
          (echo "planka healthcheck failed; terminating for restart" >&2 && kill -TERM 1)
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
