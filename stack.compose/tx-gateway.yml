services:
  tx-gateway:
    image: datamancy/tx-gateway:local-build
    build:
      context: .
      dockerfile: ./stack.containers/tx-gateway/Dockerfile
    container_name: tx-gateway
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    networks:
      - trading
      - postgres
      - ldap
      - caddy
      - monitoring
    depends_on:
      postgres:
        condition: service_healthy
      ldap:
        condition: service_healthy
      ldap-ensure-suffixes:
        condition: service_completed_successfully
      authelia:
        condition: service_healthy
    environment:
      PORT: 8080
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: txgateway
      POSTGRES_USER: txgateway
      POSTGRES_PASSWORD: ${POSTGRES_TXGATEWAY_PASSWORD}
      POSTGRES_MARKET_DATA_HOST: postgres
      POSTGRES_MARKET_DATA_PORT: 5432
      POSTGRES_MARKET_DATA_DB: datamancy
      POSTGRES_MARKET_DATA_USER: ${POSTGRES_PIPELINE_USER}
      POSTGRES_MARKET_DATA_PASSWORD: ${POSTGRES_PIPELINE_PASSWORD}
      LDAP_HOST: ldap
      LDAP_PORT: 389
      LDAP_BASE_DN: ${LDAP_BASE_DN}
      LDAP_BIND_DN: cn=admin,${LDAP_BASE_DN}
      LDAP_BIND_PASSWORD: ${LDAP_ADMIN_PASSWORD}
      LDAP_DEFAULT_ALLOWED_EXCHANGES: ${LDAP_DEFAULT_ALLOWED_EXCHANGES:-swyftx,binance,bybit,coinbase,dydx,hyperliquid,aster}
      LDAP_DEFAULT_ALLOWED_TRADING_MODES: ${LDAP_DEFAULT_ALLOWED_TRADING_MODES:-backtest,forward_paper}
      AUTHELIA_JWKS_URL: http://authelia:9091/jwks.json
      AUTHELIA_JWT_ISSUER: ${AUTHELIA_URL}
      AUTHELIA_JWT_AUDIENCE: ${TXG_JWT_AUDIENCE:-tx-gateway}
      AUTHELIA_USERINFO_URL: http://authelia:9091/api/oidc/userinfo
      TXG_CORS_ALLOWED_ORIGINS: ${TXG_CORS_ALLOWED_ORIGINS:-}
      EVM_BROADCASTER_URL: http://evm-broadcaster:8081
      HYPERLIQUID_WORKER_URL: http://hyperliquid-worker:8082
      HYPERLIQUID_MAINNET: ${HYPERLIQUID_MAINNET:-false}
      HYPERLIQUID_QUOTE_EXCHANGE: ${HYPERLIQUID_QUOTE_EXCHANGE:-hyperliquid_testnet}
      HYPERLIQUID_QUOTE_EXCHANGE_ALLOW_CANONICAL_FALLBACK: ${HYPERLIQUID_QUOTE_EXCHANGE_ALLOW_CANONICAL_FALLBACK:-true}
      WORKER_SHARED_TOKEN: ${WORKER_SHARED_TOKEN}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
