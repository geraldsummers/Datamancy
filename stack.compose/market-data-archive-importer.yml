services:
  market-data-archive-importer:
    image: datamancy/market-data-archive-importer:local-build
    build:
      context: .
      dockerfile: ./stack.containers/market-data-archive-importer/Dockerfile
    container_name: market-data-archive-importer
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    networks:
      - trading
      - monitoring
    depends_on:
      market-postgres:
        condition: service_healthy
    environment:
      PORT: 8080
      POSTGRES_HOST: market-postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: datamancy
      POSTGRES_USER: ${POSTGRES_PIPELINE_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PIPELINE_PASSWORD}
      ARCHIVE_AWS_REGION: ${ARCHIVE_AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
