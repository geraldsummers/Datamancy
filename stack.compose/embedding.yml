services:
  embedding-service:
    image: datamancy/embedding-bge:local-build
    pull_policy: build
    build:
      context: ./stack.containers/embedding-bge
      dockerfile: Dockerfile
    container_name: embedding-service
    restart: unless-stopped
    networks:
      - ai
    environment:
      RUST_LOG: warn
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    command: >
      --model-id /data/bge-m3
      --dtype float16
      --port 8080
      --max-concurrent-requests 1024
      --max-batch-tokens 8192
      --max-batch-requests 256
      --max-client-batch-size 160
      --pooling mean
    deploy:
      resources:
        limits:
          cpus: '20.0'
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s
