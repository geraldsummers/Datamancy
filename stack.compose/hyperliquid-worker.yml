services:
  hyperliquid-worker:
    image: datamancy/hyperliquid-worker:local-build
    build:
      context: ./stack.containers/hyperliquid-worker
      dockerfile: Dockerfile
    container_name: hyperliquid-worker
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    networks:
      - trading
      - monitoring
    environment:
      HYPERLIQUID_API_URL: ${HYPERLIQUID_API_URL:-}
      HYPERLIQUID_MAINNET: ${HYPERLIQUID_MAINNET:-false}
      HYPERLIQUID_WORKER_THREADS: ${HYPERLIQUID_WORKER_THREADS:-8}
      WORKER_SHARED_TOKEN: ${WORKER_SHARED_TOKEN}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8082/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
