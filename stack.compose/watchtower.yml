services:
  watchtower:
    image: containrrr/watchtower:1.7.1
    container_name: watchtower
    restart: unless-stopped
    networks:
      - docker-proxy
      - internet
      - caddy
      - monitoring
    depends_on:
      docker-socket-proxy:
        condition: service_healthy
      prometheus:
        condition: service_started
      ntfy:
        condition: service_started
    environment:
      WATCHTOWER_CLEANUP: true
      WATCHTOWER_INCLUDE_RESTARTING: true
      WATCHTOWER_SCHEDULE: 0 0 4 * * *
      DOCKER_API_VERSION: 1.44
      WATCHTOWER_NOTIFICATIONS: shoutrrr
      # Using ntfy scheme with insecure flag since ntfy uses HTTP:80 internally
      WATCHTOWER_NOTIFICATION_URL: "ntfy://${NTFY_USERNAME}:${NTFY_PASSWORD}@ntfy:80/watchtower?insecure=true"
      WATCHTOWER_HTTP_API_METRICS: true
      WATCHTOWER_HTTP_API_TOKEN: ${WATCHTOWER_METRICS_TOKEN}
      TZ: Australia/Sydney
      DOCKER_HOST: tcp://docker-socket-proxy:2375

networks:
  docker-proxy:
    external: true
    name: datamancy_docker-proxy
  internet:
    external: true
    name: datamancy_internet
  caddy:
    external: true
    name: datamancy_caddy
  monitoring:
    external: true
    name: datamancy_monitoring
