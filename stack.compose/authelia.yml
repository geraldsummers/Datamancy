services:
  authelia:
    image: authelia/authelia:4.39.15
    container_name: authelia
    restart: unless-stopped
    networks:
      authelia:
      caddy:
      ldap:
      postgres:
      valkey:
    depends_on:
      ldap:
        condition: service_started
      postgres:
        condition: service_started
      valkey:
        condition: service_started
      valkey-init:
        condition: service_completed_successfully
    environment:
      TZ: UTC
      DOMAIN: ${DOMAIN}
    volumes:
      - authelia_data:/config
      - ./configs/authelia/configuration.yml:/config/configuration.yml:ro
      - ./configs/authelia/oidc_rsa.pem:/config/oidc_rsa.pem:ro
      - ./configs/authelia/entrypoint.sh:/entrypoint.sh:ro
    command:
      - --config
      - /config/configuration.yml
    entrypoint:
      - /entrypoint.sh
    healthcheck:
      test:
        - CMD-SHELL
        - |
          wget --quiet --tries=1 --timeout=2 -O- http://localhost:9091/api/health | grep -q OK && \
          wget --quiet --tries=1 --timeout=2 -O- http://localhost:9091/.well-known/openid-configuration | grep -q issuer && \
          wget --quiet --tries=1 --timeout=2 -O- http://localhost:9091/jwks.json | grep -q keys
      interval: 5s
      timeout: 4s
      retries: 3
      start_period: 30s
