# ============================================================================
# Docker Socket Proxies - Secure Access to Docker Daemons
# ============================================================================
#
# Two proxy services:
#   1. docker-vm-socket-proxy: Access to isolated Docker VM (for CI/CD, builds)
#   2. docker-socket-proxy: Access to host Docker daemon (for monitoring, management)
#
# ============================================================================
# docker-vm-socket-proxy - Isolated VM Docker Access
# ============================================================================
#
# Purpose: Provides secure, permission-controlled access to a Docker daemon
# running on an isolated VM (e.g., a separate physical machine for CI/CD,
# container builds, or security-sensitive workloads).
#
# Architecture:
#   1. isolated-docker-vm-tunnel: Establishes SSH tunnel to remote Docker host
#      - Connects via SSH to ISOLATED_DOCKER_VM_HOST (configured in datamancy.config.yaml)
#      - Forwards remote /var/run/docker.sock to local volume
#      - Requires SSH key authentication (mounts ~/.ssh)
#      - Uses network_mode: host for direct network access
#
#   2. docker-vm-socket-proxy: HAProxy-based security layer
#      - Provides fine-grained permission control (CONTAINERS, IMAGES, etc.)
#      - Exposes filtered Docker API on tcp://docker-vm-socket-proxy:2375
#      - Prevents dangerous operations (COMMIT=0)
#
# Usage:
#   - Configure ISOLATED_DOCKER_VM_HOST in global.settings/datamancy.config.yaml
#   - Format: user@ip_address (e.g., gerald@192.168.0.69)
#   - Ensure SSH key-based auth is configured (~/.ssh/id_rsa or similar)
#   - Other services connect via: DOCKER_HOST=tcp://docker-vm-socket-proxy:2375
#
# ============================================================================
# docker-socket-proxy - Host Docker Access
# ============================================================================
#
# Purpose: Provides secure, permission-controlled access to the host Docker
# daemon for monitoring and management services (Watchtower, Dozzle, etc.)
#
# Architecture:
#   - Mounts host /var/run/docker.sock
#   - HAProxy-based security layer with restricted permissions
#   - Exposes filtered Docker API on tcp://docker-socket-proxy:2375
#   - Read-only access for most services
#
# Usage:
#   - Other services connect via: DOCKER_HOST=tcp://docker-socket-proxy:2375
#   - Or mount volumes: docker-socket-proxy:2375
#
# Security Notes:
#   - Only enable required permissions (see environment variables below)
#   - Never expose proxy ports to untrusted networks
#   - Use SSH key authentication for VM access (no passwords)
# ============================================================================

services:
  docker-vm-socket-proxy:
    image: tecnativa/docker-socket-proxy:v0.4.2
    container_name: docker-vm-socket-proxy
    restart: unless-stopped
    networks:
      - docker-proxy
    volumes:
      - /run/docker-labware/docker.sock:/var/run/docker.sock:ro
    environment:
      # Permissions - only enable what's needed
      CONTAINERS: 1    # List/inspect containers
      IMAGES: 1        # List/inspect images
      NETWORKS: 1      # List/inspect networks
      VOLUMES: 1       # List/inspect volumes
      POST: 1          # Allow POST requests (create/start/stop)
      DELETE: 1        # Allow DELETE requests (remove containers/images)
      INFO: 1          # Docker daemon info
      VERSION: 1       # Docker version

      # Additional operations
      BUILD: 1         # Enable docker build for CI/CD
      COMMIT: 0        # Disable container commits
      EXEC: 1          # Enable container exec for tests/diagnostics
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:2375/version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:v0.4.2
    container_name: docker-socket-proxy
    restart: unless-stopped
    networks:
      - docker-proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      # Permissions for monitoring and management services
      CONTAINERS: 1    # List/inspect containers
      IMAGES: 1        # List/inspect images
      NETWORKS: 1      # List/inspect networks
      VOLUMES: 1       # List/inspect volumes
      LOGS: 1          # Allow container logs
      POST: 1          # Allow POST requests (start/stop for Watchtower)
      DELETE: 1        # Allow DELETE requests (cleanup old images)
      INFO: 1          # Docker daemon info
      VERSION: 1       # Docker version
      SERVICES: 1      # Docker Swarm services (if used)
      TASKS: 1         # Docker Swarm tasks (if used)

      # Restricted operations
      BUILD: 0         # Disable docker build
      COMMIT: 0        # Disable container commits
      EXEC: 0          # Disable container exec
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:2375/version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  docker-proxy:
    driver: bridge
