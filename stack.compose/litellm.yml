services:
  litellm:
    image: ghcr.io/berriai/litellm:v1.80.8-stable.1
    container_name: litellm
    restart: unless-stopped
    networks:
      ai:
        aliases:
          - litellm.${DOMAIN}
          - api.litellm.${DOMAIN}
      litellm:
        aliases:
          - litellm.${DOMAIN}
          - api.litellm.${DOMAIN}
      caddy:
        aliases:
          - litellm.${DOMAIN}
          - api.litellm.${DOMAIN}
      postgres:
    depends_on:
      caddy:
        condition: service_healthy
      vllm-7b:
        condition: service_healthy
        restart: true
      embedding-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      UI_USERNAME: ${STACK_ADMIN_USER}
    volumes:
      - litellm_config:/app/config
      - ./configs/litellm/config.yaml:/app/config.yaml:ro
    command: --config /app/config.yaml --port 4000 --num_workers 4
    healthcheck:
      test:
        - CMD-SHELL
        - |
          python -c "import json,sys,urllib.request; \
          urllib.request.urlopen('http://localhost:4000/openapi.json', timeout=5).read(); \
          urllib.request.urlopen('http://vllm-7b:8000/health', timeout=5).read(); \
          data=json.loads(urllib.request.urlopen('http://vllm-7b:8000/v1/models', timeout=5).read().decode()); \
          ids=[m.get('id','') for m in data.get('data',[]) if isinstance(m,dict)]; \
          sys.exit(0 if any('qwen' in i.lower() for i in ids) else 1)"
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 60s
