services:
  litellm:
    image: ghcr.io/berriai/litellm:v1.80.8-stable.1
    container_name: litellm
    restart: unless-stopped
    networks:
      ai:
        aliases:
          - litellm.${DOMAIN}
          - api.litellm.${DOMAIN}
      litellm:
        aliases:
          - litellm.${DOMAIN}
          - api.litellm.${DOMAIN}
      caddy:
        aliases:
          - litellm.${DOMAIN}
          - api.litellm.${DOMAIN}
      postgres:
    depends_on:
      caddy:
        condition: service_started
      vllm-7b:
        condition: service_started
      embedding-service:
        condition: service_started
      postgres:
        condition: service_started
    environment:
      UI_USERNAME: ${STACK_ADMIN_USER}
    volumes:
      - litellm_config:/app/config
      - ./configs/litellm/config.yaml:/app/config.yaml:ro
    command: --config /app/config.yaml --port 4000 --num_workers 4
    # Healthcheck disabled - all LiteLLM endpoints require authentication
    # Service health can be verified through application-level monitoring
    healthcheck:
      disable: true
