services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:0.4.6
    container_name: open-webui
    restart: unless-stopped
    networks:
      caddy:
        aliases:
          - open-webui.${DOMAIN}
      postgres:
        aliases:
          - open-webui.${DOMAIN}
      litellm:
        aliases:
          - open-webui.${DOMAIN}
      authelia:
        aliases:
          - open-webui.${DOMAIN}
    depends_on:
      caddy:
        condition: service_started
      postgres:
        condition: service_started
      litellm:
        condition: service_started
    environment:
      WEBUI_URL: ${OPENWEBUI_WEBUI_URL:-https://open-webui.${DOMAIN}}
      ENABLE_OAUTH_SIGNUP: ${OPENWEBUI_ENABLE_OAUTH_SIGNUP:-true}
      DEFAULT_USER_ROLE: ${OPENWEBUI_DEFAULT_USER_ROLE:-admin}
      ENABLE_OPENAI_API: true
      OPENAI_API_BASE_URL: ${OPENWEBUI_OPENAI_API_BASE_URL:-http://litellm:4000/v1}
      DEFAULT_MODELS: qwen2.5-7b-instruct
      STREAMING_CHUNK_SIZE: 1
      ENABLE_OLLAMA_API: "false"
      ENABLE_RAG_WEB_LOADER_SSL_VERIFICATION: false
      RAG_EMBEDDING_ENGINE: openai
      RAG_EMBEDDING_MODEL: bge-m3
      RAG_RERANKING_MODEL: ""
      OPENID_PROVIDER_URL: https://auth.${DOMAIN}
      OAUTH_CLIENT_ID: open-webui
      OAUTH_PROVIDER_NAME: Authelia
      OAUTH_SCOPES: openid profile email groups
      ENABLE_LOGIN_FORM: false
      WEBUI_AUTH: false
      SSL_CERT_FILE: /ca/caddy-ca.crt
      REQUESTS_CA_BUNDLE: /ca/caddy-ca.crt
    volumes:
      - open_webui_data:/app/backend/data
      - caddy_ca:/ca:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 90s
