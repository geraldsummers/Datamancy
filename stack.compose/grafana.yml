services:
  grafana:
    image: grafana/grafana:11.6.9
    container_name: grafana
    restart: unless-stopped
    networks:
      caddy:
        aliases:
          - grafana.${DOMAIN}
      postgres:
        aliases:
          - grafana.${DOMAIN}
      authelia:
        aliases:
          - grafana.${DOMAIN}
      monitoring:
        aliases:
          - grafana.${DOMAIN}
    depends_on:
      caddy:
        condition: service_started
      postgres:
        condition: service_started
    environment:
      GF_DEFAULT_LOCALE: en_US
      GF_SERVER_ROOT_URL: https://grafana.${DOMAIN}
      GF_SERVER_DOMAIN: grafana.${DOMAIN}
      GF_DATABASE_TYPE: postgres
      GF_DATABASE_HOST: postgres:5432
      GF_DATABASE_NAME: grafana
      GF_DATABASE_USER: grafana
      GF_DATABASE_SSL_MODE: disable
      GF_DATABASE_CONN_MAX_LIFETIME: 12000
      GF_AUTH_PROXY_ENABLED: true
      GF_AUTH_PROXY_HEADER_NAME: Remote-User
      GF_AUTH_PROXY_HEADER_PROPERTY: username
      GF_AUTH_PROXY_AUTO_SIGN_UP: true
      GF_AUTH_PROXY_HEADERS: "Email:Remote-Email Name:Remote-Name"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/market-data.json
      GF_ALERTING_ENABLED: false
      GF_UNIFIED_ALERTING_ENABLED: false
      POSTGRES_PIPELINE_USER: ${POSTGRES_PIPELINE_USER}
      POSTGRES_PIPELINE_PASSWORD: ${POSTGRES_PIPELINE_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./configs/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./configs/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 180s
