services:
  alpha-dataset-service:
    image: datamancy/alpha-dataset-service:local-build
    build:
      context: .
      dockerfile: ./stack.containers/alpha-dataset-service/Dockerfile
    container_name: alpha-dataset-service
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    networks:
      - trading
      - postgres
      - monitoring
    depends_on:
      market-postgres:
        condition: service_healthy
    environment:
      PORT: 8080
      POSTGRES_HOST: market-postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: datamancy
      POSTGRES_USER: ${POSTGRES_PIPELINE_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PIPELINE_PASSWORD}
      DATAMANCY_TRADING_POLICY_FILE: /app/config/trading-policy.json
    volumes:
      - ./configs/trading/trading-policy.json:/app/config/trading-policy.json:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
