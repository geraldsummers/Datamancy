services:
  market-postgres:
    image: timescale/timescaledb@sha256:0af03ecf697825f6ddae76fd275d16bf46007bed6d00eb3d754779cb7db96fa6
    container_name: market-postgres
    restart: unless-stopped
    networks:
      - postgres
    environment:
      POSTGRES_USER: ${POSTGRES_ADMIN_USER}
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD}
      POSTGRES_DB: postgres
      POSTGRES_PIPELINE_PASSWORD: ${POSTGRES_PIPELINE_PASSWORD}
      POSTGRES_SEARCH_SERVICE_PASSWORD: ${POSTGRES_SEARCH_SERVICE_PASSWORD}
      POSTGRES_TEST_RUNNER_PASSWORD: ${POSTGRES_TEST_RUNNER_PASSWORD}
    volumes:
      - ${VECTOR_DB_ROOT}/market-postgres:/var/lib/postgresql/data
      - ./configs/postgres/init-market-db.sh:/docker-entrypoint-initdb.d/01-init-market-db.sh:ro
      - ./configs/postgres/init-market-data-schema.sql:/docker-entrypoint-initdb.d/init-market-data-schema.sql:ro
    command: postgres -c 'max_connections=300' -c 'shared_buffers=1GB' -c 'max_worker_processes=48' -c 'max_parallel_workers=8' -c 'timescaledb.max_background_workers=16'
    healthcheck:
      test:
        - CMD-SHELL
        - |
          pg_isready -U ${POSTGRES_ADMIN_USER} -d datamancy -t 1 && \
          psql -U ${POSTGRES_ADMIN_USER} -d datamancy -t -c 'SELECT 1' > /dev/null
      interval: 60s
      timeout: 10s
      retries: 20
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: '2.0'
