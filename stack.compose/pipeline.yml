services:
  knowledge-ingestion:
    image: datamancy/knowledge-ingestion:local-build
    build:
      context: .
      dockerfile: ./stack.containers/knowledge-ingestion/Dockerfile
    container_name: knowledge-ingestion
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

    networks:
      - postgres
      - internet
      - mariadb
    depends_on:
      caddy:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      RSS_SCHEDULE_MINUTES: "60"
      RSS_FEED_URLS: "https://cointelegraph.com/rss,https://www.coindesk.com/arc/outboundfeeds/rss/,https://decrypt.co/feed,https://www.theblock.co/rss.xml,https://www.marketwatch.com/rss/topstories,https://feeds.reuters.com/reuters/businessNews,https://feeds.bbci.co.uk/news/business/rss.xml,https://rss.nytimes.com/services/xml/rss/nyt/Business.xml,https://rss.nytimes.com/services/xml/rss/nyt/Technology.xml,https://hnrss.org/frontpage,https://feeds.arstechnica.com/arstechnica/index,https://www.investing.com/rss/news_25.rss,https://feeds.bbci.co.uk/news/world/rss.xml,https://www.abc.net.au/news/feed/51120/rss.xml"
      RSS_SENTIMENT_LITELLM_URL: "http://litellm:4000/v1"
      RSS_SENTIMENT_MODEL: "${RSS_SENTIMENT_MODEL:-qwen2.5-7b-instruct}"
      RSS_SENTIMENT_TIMEOUT_MS: "${RSS_SENTIMENT_TIMEOUT_MS:-8000}"
      RSS_SENTIMENT_LITELLM_API_KEY: "${LITELLM_MASTER_KEY:-}"

      CVE_API_KEY: "${CVE_API_KEY:-}"
      CVE_SCHEDULE_MINUTES: "1440"
      CVE_MAX_RESULTS: "2147483647"

      TORRENTS_DATA_PATH: "https://codeberg.org/heretic/torrents-csv-data/raw/branch/main/torrents.csv"
      TORRENTS_SCHEDULE_MINUTES: "10080"
      TORRENTS_MAX_RESULTS: "2147483647"

      WIKIPEDIA_DUMP_PATH: "https://dumps.wikimedia.org/enwiki/latest/enwiki-latest-pages-articles.xml.bz2"
      WIKIPEDIA_SCHEDULE_MINUTES: "43200"
      WIKIPEDIA_MAX_ARTICLES: "2147483647"

      AUSTRALIAN_LAWS_JURISDICTIONS: "commonwealth,nsw,vic,qld,wa,sa,tas,act,nt"
      AUSTRALIAN_LAWS_MAX_PER_JURISDICTION: "100"
      AUSTRALIAN_LAWS_START_YEAR: "2020"
      AUSTRALIAN_LAWS_SCHEDULE_MINUTES: "1440"

      LINUX_DOCS_SOURCES: "MAN_PAGES,DEBIAN_DOCS"
      LINUX_DOCS_SCHEDULE_MINUTES: "10080"
      LINUX_DOCS_MAX: "2147483647"

      WIKI_TYPES: "DEBIAN,ARCH"
      WIKI_MAX_PAGES_PER_WIKI: "500"
      WIKI_SCHEDULE_MINUTES: "10080"

      POSTGRES_JDBC_URL: jdbc:postgresql://postgres:5432/datamancy
      POSTGRES_USER: ${POSTGRES_PIPELINE_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PIPELINE_PASSWORD}

      QDRANT_RSS_COLLECTION: rss_feeds
      QDRANT_CVE_COLLECTION: cve
      QDRANT_TORRENTS_COLLECTION: torrents
      QDRANT_MARKET_COLLECTION: market_data
      QDRANT_WIKIPEDIA_COLLECTION: wikipedia
      QDRANT_AUSTRALIAN_LAWS_COLLECTION: australian_laws
      QDRANT_LINUX_DOCS_COLLECTION: linux_docs
      QDRANT_DEBIAN_WIKI_COLLECTION: debian_wiki
      QDRANT_ARCH_WIKI_COLLECTION: arch_wiki
    volumes:
      - pipeline_data:/data
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 wget --quiet --tries=1 -O /dev/null http://127.0.0.1:8090/health || exit 1"]
      interval: 60s
      timeout: 20s
      retries: 3
      start_period: 60s

  embedding-worker:
    image: datamancy/embedding-worker:local-build
    build:
      context: .
      dockerfile: ./stack.containers/embedding-worker/Dockerfile
    container_name: embedding-worker
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

    networks:
      - qdrant
      - postgres
      - ai
    depends_on:
      qdrant:
        condition: service_started
      postgres:
        condition: service_healthy
      embedding-service:
        condition: service_healthy
    environment:
      EMBEDDING_SERVICE_URL: http://embedding-service:8080
      EMBEDDING_WORKER_BATCH_SIZE: "1024"
      EMBEDDING_WORKER_POLL_INTERVAL_SECONDS: "1"
      EMBEDDING_WORKER_MAX_CONCURRENT: "128"
      EMBEDDING_WORKER_REQUEST_BATCH_SIZE: "160"
      EMBEDDING_WORKER_MAX_CONCURRENT_BATCHES: "20"
      EMBEDDING_WORKER_MAX_RETRIES: "3"
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6334
      QDRANT_API_KEY: ${QDRANT_ADMIN_API_KEY}
      POSTGRES_JDBC_URL: jdbc:postgresql://postgres:5432/datamancy
      POSTGRES_USER: ${POSTGRES_PIPELINE_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PIPELINE_PASSWORD}

      QDRANT_RSS_COLLECTION: rss_feeds
      QDRANT_CVE_COLLECTION: cve
      QDRANT_TORRENTS_COLLECTION: torrents
      QDRANT_MARKET_COLLECTION: market_data
      QDRANT_WIKIPEDIA_COLLECTION: wikipedia
      QDRANT_AUSTRALIAN_LAWS_COLLECTION: australian_laws
      QDRANT_LINUX_DOCS_COLLECTION: linux_docs
      QDRANT_DEBIAN_WIKI_COLLECTION: debian_wiki
      QDRANT_ARCH_WIKI_COLLECTION: arch_wiki

  content-publisher:
    image: datamancy/content-publisher:local-build
    build:
      context: .
      dockerfile: ./stack.containers/content-publisher/Dockerfile
    container_name: content-publisher
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

    networks:
      - postgres
      - mariadb
      - internet
    depends_on:
      postgres:
        condition: service_healthy
      bookstack:
        condition: service_started
    environment:
      BOOKSTACK_ENABLED: "true"
      BOOKSTACK_URL: "http://bookstack:80"
      BOOKSTACK_ALLOWED_SOURCES: "rss,cve,wikipedia,australian_laws,linux_docs,debian_wiki,arch_wiki"

      POSTGRES_JDBC_URL: jdbc:postgresql://postgres:5432/datamancy
      POSTGRES_USER: ${POSTGRES_PIPELINE_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PIPELINE_PASSWORD}

  nats:
    image: nats:2.11-alpine
    container_name: market-data-nats
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    command:
      - "--jetstream"
      - "--store_dir=/data"
    networks:
      - postgres

  market-data-plumbing:
    image: docker.redpanda.com/redpandadata/connect:latest
    container_name: market-data-plumbing
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    command: ["run", "/etc/redpanda-connect/redpanda-connect.yaml"]
    depends_on:
      nats:
        condition: service_started
    networks:
      - postgres
    environment:
      RAW_EVENT_BUS_URL: nats://nats:4222
      RAW_EVENT_STREAM: MARKET_DATA_RAW
      RAW_EVENT_INGEST_SUBJECT_PREFIX: raw.market.ingest
      RAW_EVENT_PERSIST_SUBJECT_PREFIX: raw.market.persist.coalesced
      RAW_EVENT_DLQ_SUBJECT: raw.market.dlq
      RAW_EVENT_ORDERBOOK_DEDUPE_TTL: "5s"
      RAW_EVENT_MAX_ACK_PENDING: "2048"
    volumes:
      - ./configs/market-data-plumbing/redpanda-connect.yaml:/etc/redpanda-connect/redpanda-connect.yaml:ro

  market-data-sync:
    image: datamancy/market-data-sync:local-build
    build:
      context: .
      dockerfile: ./stack.containers/market-data-sync/Dockerfile
    container_name: market-data-sync
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    networks:
      - internet
      - postgres
    depends_on:
      nats:
        condition: service_started
    environment:
      DATAMANCY_TRADING_POLICY_FILE: /app/config/trading-policy.json
      RAW_EVENT_BUS_URL: nats://nats:4222
      RAW_EVENT_STREAM: MARKET_DATA_RAW
      RAW_EVENT_INGEST_SUBJECT_PREFIX: raw.market.ingest
      RAW_EVENT_PERSIST_SUBJECT_PREFIX: raw.market.persist.coalesced
      RAW_EVENT_DLQ_SUBJECT: raw.market.dlq
    volumes:
      - ./configs/trading/trading-policy.json:/app/config/trading-policy.json:ro

  raw-candle-repair:
    image: datamancy/market-data-repair:local-build
    build:
      context: .
      dockerfile: ./stack.containers/market-data-repair/Dockerfile
    container_name: raw-candle-repair
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    networks:
      - postgres
      - internet
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: datamancy
      POSTGRES_USER: ${POSTGRES_PIPELINE_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PIPELINE_PASSWORD}
      DATAMANCY_TRADING_POLICY_FILE: /app/config/trading-policy.json
      RAW_EVENT_BUS_URL: nats://nats:4222
      RAW_EVENT_STREAM: MARKET_DATA_RAW
      RAW_EVENT_INGEST_SUBJECT_PREFIX: raw.market.ingest
      RAW_EVENT_PERSIST_SUBJECT_PREFIX: raw.market.persist.coalesced
      RAW_EVENT_DLQ_SUBJECT: raw.market.dlq
    volumes:
      - ./configs/trading/trading-policy.json:/app/config/trading-policy.json:ro

  market-data-persist:
    image: datamancy/market-data-persist:local-build
    build:
      context: .
      dockerfile: ./stack.containers/market-data-persist/Dockerfile
    container_name: market-data-persist
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    networks:
      - postgres
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
      market-data-plumbing:
        condition: service_started
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: datamancy
      POSTGRES_USER: ${POSTGRES_PIPELINE_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PIPELINE_PASSWORD}
      DATAMANCY_TRADING_POLICY_FILE: /app/config/trading-policy.json
      MARKET_DATA_BATCH_SIZE: "1000"
      MARKET_DATA_ORDERBOOK_BATCH_SIZE: "5000"
      MARKET_DATA_ASSET_CONTEXT_BATCH_SIZE: "5000"
      ORDERBOOK_PERSIST_WORKERS: "4"
      ASSET_CONTEXT_PERSIST_WORKERS: "2"
      MARKET_DATA_FLUSH_SECONDS: "10"
      RAW_EVENT_FETCH_BATCH: "1024"
      RAW_EVENT_MAX_ACK_PENDING: "8192"
      RAW_EVENT_BUS_URL: nats://nats:4222
      RAW_EVENT_STREAM: MARKET_DATA_RAW
      RAW_EVENT_INGEST_SUBJECT_PREFIX: raw.market.ingest
      RAW_EVENT_PERSIST_SUBJECT_PREFIX: raw.market.persist.coalesced
      RAW_EVENT_DLQ_SUBJECT: raw.market.dlq
    volumes:
      - ./configs/trading/trading-policy.json:/app/config/trading-policy.json:ro

  research-feature-materializer:
    image: datamancy/feature-materializer:local-build
    build:
      context: .
      dockerfile: ./stack.containers/feature-materializer/Dockerfile
    container_name: research-feature-materializer
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    networks:
      - postgres
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: datamancy
      POSTGRES_USER: ${POSTGRES_PIPELINE_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PIPELINE_PASSWORD}
      DATAMANCY_TRADING_POLICY_FILE: /app/config/trading-policy.json
      RESEARCH_FEATURES_BACKGROUND_PHASE_BUDGET_MS: "120000"
      RESEARCH_FEATURES_WINDOW_TIMEOUT_SECONDS: "10"
    volumes:
      - ./configs/trading/trading-policy.json:/app/config/trading-policy.json:ro

  market-data-health-updater:
    image: datamancy/market-data-state-updater:local-build
    build:
      context: .
      dockerfile: ./stack.containers/market-data-state-updater/Dockerfile
    container_name: market-data-health-updater
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    networks:
      - postgres
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: datamancy
      POSTGRES_USER: ${POSTGRES_PIPELINE_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PIPELINE_PASSWORD}
      DATAMANCY_TRADING_POLICY_FILE: /app/config/trading-policy.json
      MARKET_DATA_STATE_REFRESH_INTERVAL_MS: "300000"
      MARKET_DATA_STATE_REFRESH_LOOKBACK_HOURS: "48"
    volumes:
      - ./configs/trading/trading-policy.json:/app/config/trading-policy.json:ro
