services:
  jupyterhub:
    image: datamancy-jupyterhub:5.4.3
    build:
      context: ./stack.containers/jupyterhub
      dockerfile: Dockerfile
    container_name: jupyterhub
    command: ["jupyterhub", "-f", "/config/jupyterhub_config.py"]
    restart: unless-stopped
    networks:
      caddy:
        aliases:
          - jupyterhub.${DOMAIN}
      litellm:
        aliases:
          - jupyterhub.${DOMAIN}
      postgres:
        aliases:
          - jupyterhub.${DOMAIN}
      docker-proxy:
        aliases:
          - jupyterhub.${DOMAIN}
    depends_on:
      caddy:
        condition: service_started
      jupyter-notebook-build:
        condition: service_completed_successfully
      valkey:
        condition: service_started
    environment:
      DOCKER_NETWORK_NAME: datamancy_litellm
      JUPYTER_NOTEBOOK_IMAGE: ${JUPYTER_NOTEBOOK_IMAGE:-datamancy-jupyter-notebook:5.4.3}
      DOCKER_HOST: tcp://docker-socket-proxy:2375
      JUPYTERHUB_ALLOWED_REMOTE_GROUPS: ${JUPYTERHUB_ALLOWED_REMOTE_GROUPS:-users,admins}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      LITELLM_API_KEY: ${LITELLM_MASTER_KEY}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: datamancy
      POSTGRES_USER: ${POSTGRES_PIPELINE_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PIPELINE_PASSWORD}
      ALPHA_ANALYTICS_URL: ${ALPHA_ANALYTICS_URL:-http://alpha-analytics-service:8080}
      DATAMANCY_FORWARD_TEST_STRATEGY_NAME: ${DATAMANCY_FORWARD_TEST_STRATEGY_NAME:-tx_gateway_forward_mainnet_data}
      DATAMANCY_FORWARD_TEST_EXCHANGE: ${DATAMANCY_FORWARD_TEST_EXCHANGE:-hyperliquid_mainnet}
      DATAMANCY_FORWARD_TEST_SYMBOL: ${DATAMANCY_FORWARD_TEST_SYMBOL:-BTC}
      DATAMANCY_FORWARD_TEST_LOOKBACK: "${DATAMANCY_FORWARD_TEST_LOOKBACK:-12 hours}"
      DATAMANCY_FORWARD_TEST_EXECUTION_MODE: ${DATAMANCY_FORWARD_TEST_EXECUTION_MODE:-forward_paper}
      DATAMANCY_FORWARD_TEST_MARKET_DATA_MODE: ${DATAMANCY_FORWARD_TEST_MARKET_DATA_MODE:-mainnet_live}
      DATAMANCY_FORWARD_TEST_PERSIST: ${DATAMANCY_FORWARD_TEST_PERSIST:-true}
      DATAMANCY_FORWARD_TEST_MAX_ROWS: ${DATAMANCY_FORWARD_TEST_MAX_ROWS:-500}
    volumes:
      - jupyterhub_data:/srv/jupyterhub
      - ./configs/jupyterhub/jupyterhub_config.py:/config/jupyterhub_config.py:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/hub/health || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 90s
