services:
  caddy:
    image: caddy:2.10.2
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    networks:
      caddy:
        aliases:
          - www.${DOMAIN}
          - grafana.${DOMAIN}
          - open-webui.${DOMAIN}
          - vaultwarden.${DOMAIN}
          - app.vaultwarden.${DOMAIN}
          - planka.${DOMAIN}
          - bookstack.${DOMAIN}
          - jupyterhub.${DOMAIN}
          - homepage.${DOMAIN}
          - seafile.${DOMAIN}
          - api.seafile.${DOMAIN}
          - onlyoffice.${DOMAIN}
          - matrix.${DOMAIN}
          - api.matrix.${DOMAIN}
          - element.${DOMAIN}
          - homeassistant.${DOMAIN}
          - api.homeassistant.${DOMAIN}
          - litellm.${DOMAIN}
          - api.litellm.${DOMAIN}
          - auth.${DOMAIN}
          - kopia.${DOMAIN}
          - mail.${DOMAIN}
          - sogo.${DOMAIN}
          - agent-tool-server.${DOMAIN}
          - lam.${DOMAIN}
          - forgejo.${DOMAIN}
          - qbittorrent.${DOMAIN}
      authelia:
      postgres:
      mariadb:
      qdrant:
      ldap:
      litellm:
      ai:
        aliases:
          - ${DOMAIN}
          - www.${DOMAIN}
          - auth.${DOMAIN}
          - grafana.${DOMAIN}
          - jupyterhub.${DOMAIN}
          - open-webui.${DOMAIN}
          - vaultwarden.${DOMAIN}
          - prometheus.${DOMAIN}
          - homepage.${DOMAIN}
          - ntfy.${DOMAIN}
          - qbittorrent.${DOMAIN}
          - mastodon.${DOMAIN}
          - forgejo.${DOMAIN}
          - bookstack.${DOMAIN}
          - planka.${DOMAIN}
          - kopia.${DOMAIN}
          - radicale.${DOMAIN}
          - homeassistant.${DOMAIN}
          - lam.${DOMAIN}
          - mail.${DOMAIN}
          - vault.${DOMAIN}
          - element.${DOMAIN}
          - search.${DOMAIN}
          - litellm.${DOMAIN}
      mailserver:
      memcached:
      matrix-internal:
      mastodon-internal:
      monitoring:
    depends_on:
      authelia:
        condition: service_started
    environment:
      DOMAIN: ${DOMAIN}
      STACK_ADMIN_EMAIL: ${STACK_ADMIN_EMAIL}
      API_LITELLM_ALLOWLIST: ${API_LITELLM_ALLOWLIST}
      MAIL_DOMAIN: ${MAIL_DOMAIN}
      VAULTWARDEN_ORG_IDENTIFIER: ${VAULTWARDEN_ORG_IDENTIFIER}
      VAULTWARDEN_ORG_ID: ${VAULTWARDEN_ORG_ID}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - caddy_certs:/certs
      - ./configs/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./configs/vaultwarden/index.html:/srv/vaultwarden/index.html:ro
      - ./configs/radicale/index.html:/srv/radicale/index.html:ro
    entrypoint:
      - /bin/sh
      - -c
      - |
        rm -f /data/caddy/locks/*.lock 2>/dev/null || true
        exec caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
    healthcheck:
      test:
        - CMD-SHELL
        - |
          wget --quiet --tries=1 --spider --timeout=2 http://127.0.0.1:2019/config/ && \
          wget --quiet --tries=1 --spider --timeout=2 http://127.0.0.1:2019/reverse_proxy/upstreams && \
          caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile 2>&1 | grep -q "Valid configuration"
      interval: 5s
      timeout: 4s
      retries: 3
      start_period: 15s

  caddy-ca-export:
    image: alpine:latest
    container_name: caddy-ca-export
    restart: "no"
    depends_on:
      caddy:
        condition: service_started
    volumes:
      - caddy_certs:/certs:ro
      - caddy_ca:/ca:rw
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        for i in $(seq 1 60); do
          if [ -f /certs/pki/authorities/local/root.crt ]; then
            cp /certs/pki/authorities/local/root.crt /ca/caddy-ca.crt
            chmod 644 /ca/caddy-ca.crt
            echo "Caddy CA exported to /ca/caddy-ca.crt"
            exit 0
          fi
          sleep 1
        done
        echo "Caddy CA not found at /certs/pki/authorities/local/root.crt" >&2
        exit 1
