services:
  caddy:
    image: caddy:2.10.2
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    networks:
      caddy:
        aliases:
          - www.${DOMAIN}
          - grafana.${DOMAIN}
          - open-webui.${DOMAIN}
          - vaultwarden.${DOMAIN}
          - app.vaultwarden.${DOMAIN}
          - planka.${DOMAIN}
          - bookstack.${DOMAIN}
          - jupyterhub.${DOMAIN}
          - homepage.${DOMAIN}
          - seafile.${DOMAIN}
          - api.seafile.${DOMAIN}
          - onlyoffice.${DOMAIN}
          - matrix.${DOMAIN}
          - api.matrix.${DOMAIN}
          - element.${DOMAIN}
          - homeassistant.${DOMAIN}
          - api.homeassistant.${DOMAIN}
          - api.litellm.${DOMAIN}
          - auth.${DOMAIN}
          - kopia.${DOMAIN}
          - mail.${DOMAIN}
          - sogo.${DOMAIN}
          - model-context-server.${DOMAIN}
          - lam.${DOMAIN}
          - forgejo.${DOMAIN}
          - qbittorrent.${DOMAIN}
      authelia:
      postgres:
      mariadb:
      qdrant:
      ldap:
      litellm:
      ai:
        aliases:
          - ${DOMAIN}
          - www.${DOMAIN}
          - auth.${DOMAIN}
          - grafana.${DOMAIN}
          - jupyterhub.${DOMAIN}
          - open-webui.${DOMAIN}
          - vaultwarden.${DOMAIN}
          - prometheus.${DOMAIN}
          - homepage.${DOMAIN}
          - ntfy.${DOMAIN}
          - qbittorrent.${DOMAIN}
          - mastodon.${DOMAIN}
          - forgejo.${DOMAIN}
          - bookstack.${DOMAIN}
          - planka.${DOMAIN}
          - kopia.${DOMAIN}
          - homeassistant.${DOMAIN}
          - lam.${DOMAIN}
          - mail.${DOMAIN}
          - vault.${DOMAIN}
          - element.${DOMAIN}
          - search.${DOMAIN}
          - api.litellm.${DOMAIN}
      mailserver:
      memcached:
      matrix-internal:
      mastodon-internal:
      monitoring:
    depends_on:
      authelia:
        condition: service_started
    environment:
      DOMAIN: ${DOMAIN}
      STACK_ADMIN_EMAIL: ${STACK_ADMIN_EMAIL}
      API_LITELLM_ALLOWLIST: ${API_LITELLM_ALLOWLIST}
      MAIL_DOMAIN: ${MAIL_DOMAIN}
      VAULTWARDEN_ORG_IDENTIFIER: ${VAULTWARDEN_ORG_IDENTIFIER}
      VAULTWARDEN_ORG_ID: ${VAULTWARDEN_ORG_ID}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - caddy_certs:/certs
      - ./configs/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./configs/vaultwarden/index.html:/srv/vaultwarden/index.html:ro
    entrypoint:
      - /bin/sh
      - -c
      - |
        rm -f /data/caddy/locks/*.lock 2>/dev/null || true
        exec caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
    healthcheck:
      test:
        - CMD-SHELL
        - |
          wget --quiet --tries=1 --spider --timeout=2 http://127.0.0.1:2019/config/ && \
          wget --quiet --tries=1 --spider --timeout=2 http://127.0.0.1:2019/reverse_proxy/upstreams && \
          caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile 2>&1 | grep -q "Valid configuration"
      interval: 5s
      timeout: 4s
      retries: 3
      start_period: 15s

  caddy-ca-export:
    image: alpine@sha256:25109184c71bdad752c8312a8623239686a9a2071e8825f20acb8f2198c3f659
    container_name: caddy-ca-export
    restart: "no"
    depends_on:
      caddy:
        condition: service_started
    volumes:
      - caddy_certs:/certs:ro
      - caddy_ca:/ca:rw
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        BUNDLE_SRC="/etc/ssl/certs/ca-certificates.crt"
        if [ ! -f "$BUNDLE_SRC" ]; then
          BUNDLE_SRC="/etc/ssl/cert.pem"
        fi

        if [ -f "$BUNDLE_SRC" ]; then
          cp "$BUNDLE_SRC" /ca/caddy-ca.crt
        else
          touch /ca/caddy-ca.crt
        fi

        # In local-certs/dev mode, append Caddy's local root if present.
        if [ -f /certs/pki/authorities/local/root.crt ]; then
          cat /certs/pki/authorities/local/root.crt >> /ca/caddy-ca.crt
          echo "" >> /ca/caddy-ca.crt
          echo "Appended Caddy local CA to /ca/caddy-ca.crt"
        fi

        chmod 644 /ca/caddy-ca.crt
        echo "Caddy trust bundle exported to /ca/caddy-ca.crt"
