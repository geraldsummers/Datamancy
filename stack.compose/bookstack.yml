services:
  bookstack:
    image: lscr.io/linuxserver/bookstack:version-v24.12.1
    container_name: bookstack
    restart: unless-stopped
    networks:
      caddy:
        aliases:
          - bookstack.${DOMAIN}
      mariadb:
        aliases:
          - bookstack.${DOMAIN}
    depends_on:
      caddy:
        condition: service_started
      mariadb:
        condition: service_healthy
    environment:
      PUID: ${DOCKER_USER_ID:-1000}
      PGID: ${DOCKER_GROUP_ID:-1000}
      TZ: UTC
      APP_URL: https://bookstack.${DOMAIN}
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_USERNAME: bookstack
      DB_DATABASE: bookstack
      SSL_CERT_FILE: /ca/caddy-ca.crt
      CURL_CA_BUNDLE: /ca/caddy-ca.crt
    volumes:
      - bookstack_data:/config
      - ./configs/bookstack/init:/custom-cont-init.d:ro
      - caddy_ca:/ca:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/login"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 300s
