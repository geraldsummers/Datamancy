services:
  sogo:
    image: datamancy/sogo:5.12.2
    build:
      context: .
      dockerfile: stack.containers/sogo/Dockerfile
    container_name: sogo
    restart: unless-stopped
    networks:
      - caddy
      - mailserver
      - ldap
      - postgres
      - memcached
    depends_on:
      caddy:
        condition: service_started
      mailserver:
        condition: service_started
      ldap:
        condition: service_started
      postgres:
        condition: service_started
      memcached:
        condition: service_started
    environment:
      TZ: UTC
    volumes:
      - sogo_data:/var/lib/sogo
      - ./configs/sogo/sogo.conf:/etc/sogo/sogo.conf:ro
      - ./configs/sogo/sogo-vhost.conf:/etc/apache2/sites-enabled/sogo-vhost.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/80'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s
