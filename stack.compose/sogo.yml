services:
  sogo:
    image: sonroyaalmerol/docker-sogo:5.12.5-1
    container_name: sogo
    restart: unless-stopped
    labels:
      autoheal: "true"
    networks:
      - caddy
      - mailserver
      - ldap
      - postgres
      - memcached
    depends_on:
      caddy:
        condition: service_started
      mailserver:
        condition: service_started
      ldap:
        condition: service_started
      postgres:
        condition: service_started
      memcached:
        condition: service_started
    environment:
      TZ: UTC
      SSL_CERT_FILE: /ca/caddy-ca.crt
      CURL_CA_BUNDLE: /ca/caddy-ca.crt
    volumes:
      - sogo_data:/var/lib/sogo
      - ./configs/sogo/sogo.conf:/etc/sogo/sogo.conf:ro
      - ./configs/sogo/sogo-vhost.conf:/etc/apache2/conf-enabled/SOGo.conf:ro
      - caddy_ca:/ca:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -o /dev/null --max-time 8 http://localhost/SOGo/"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s
