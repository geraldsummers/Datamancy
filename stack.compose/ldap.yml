services:
  ldap:
    image: osixia/openldap:1.5.0
    container_name: ldap
    restart: unless-stopped
    networks:
      - ldap
    environment:
      LDAP_ORGANISATION: Datamancy
      LDAP_DOMAIN: ${LDAP_DOMAIN}
      LDAP_BASE_DN: ${LDAP_BASE_DN}
      LDAP_ADMIN_PASSWORD: ${LDAP_ADMIN_PASSWORD}
      LDAP_TLS: false
      LDAP_MEMBEROF_OVERLAY: true
      LDAP_MEMBEROF_GROUP_OC: groupOfNames
      LDAP_MEMBEROF_MEMBER_AD: member
    volumes:
      - ldap_data:/var/lib/ldap
      - ldap_config:/etc/ldap/slapd.d
      - ./configs/ldap/bootstrap_ldap.ldif:/container/service/slapd/assets/config/bootstrap/ldif/custom/bootstrap_ldap.ldif:ro
      - ./configs/ldap/trading-schema.ldif:/container/service/slapd/assets/config/bootstrap/schema/custom/trading-schema.ldif:ro
      - ./configs/ldap/ensure-trading-schema.sh:/tmp/ensure-trading-schema.sh:ro
      - ./configs/ldap/run-with-schema-ensure.sh:/tmp/run-with-schema-ensure.sh:ro
    entrypoint: ["/bin/sh", "/tmp/run-with-schema-ensure.sh"]
    command:
      - --copy-service
      - --loglevel
      - info
    healthcheck:
      test:
        - CMD-SHELL
        - |
          ldapsearch -Q -LLL -Y EXTERNAL -H ldapi:/// -b 'cn=schema,cn=config' '(cn=*trading*)' dn >/dev/null 2>&1 && \
          ldapsearch -x -H ldap://localhost:389 -b '' -s base '(objectclass=*)' namingContexts >/dev/null 2>&1 && \
          ldapsearch -x -H ldap://localhost:389 -D "cn=admin,$$LDAP_BASE_DN" -w "$$LDAP_ADMIN_PASSWORD" -b "$$LDAP_BASE_DN" -s base >/dev/null 2>&1
      interval: 5s
      timeout: 4s
      retries: 5
      start_period: 30s
  ldap-ensure-suffixes:
    image: osixia/openldap:1.5.0
    container_name: ldap-ensure-suffixes
    restart: "no"
    networks:
      - ldap
    depends_on:
      ldap:
        condition: service_healthy
    environment:
      LDAP_BASE_DN: ${LDAP_BASE_DN}
      LDAP_ADMIN_PASSWORD: ${LDAP_ADMIN_PASSWORD}
      STACK_ADMIN_USER: ${STACK_ADMIN_USER}
      STACK_ADMIN_EMAIL: ${STACK_ADMIN_EMAIL}
      STACK_ADMIN_PASSWORD: ${STACK_ADMIN_PASSWORD}
      LDAP_DEFAULT_ALLOWED_CHAINS: ${LDAP_DEFAULT_ALLOWED_CHAINS:-base,arbitrum,optimism}
      LDAP_DEFAULT_ALLOWED_EXCHANGES: ${LDAP_DEFAULT_ALLOWED_EXCHANGES:-swyftx,binance,bybit,coinbase,dydx,hyperliquid,aster}
      LDAP_DEFAULT_ALLOWED_TRADING_MODES: ${LDAP_DEFAULT_ALLOWED_TRADING_MODES:-backtest,forward_paper,testnet_live}
      LDAP_DEFAULT_MAX_TX_PER_HOUR: ${LDAP_DEFAULT_MAX_TX_PER_HOUR:-240}
      LDAP_DEFAULT_MAX_TX_VALUE_USD: ${LDAP_DEFAULT_MAX_TX_VALUE_USD:-25000}
    volumes:
      - ./configs/ldap/ensure_suffixes.ldif:/tmp/ensure_suffixes.ldif:ro
      - ./configs/ldap/ensure-suffixes.sh:/tmp/ensure-suffixes.sh:ro
    entrypoint: ["/bin/sh", "/tmp/ensure-suffixes.sh"]
