services:
  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    restart: unless-stopped
    networks:
      - monitoring
      - docker-proxy
    depends_on:
      loki:
        condition: service_started
    volumes:
      - ./configs/alloy/alloy.hcl:/etc/alloy/alloy.hcl:ro
    environment:
      ALLOY_DOCKER_HOST: tcp://docker-socket-proxy:2375
      ALLOY_LOG_INCLUDE: .*
      ALLOY_LOG_EXCLUDE: ^$
    command:
      - run
      - /etc/alloy/alloy.hcl
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:12345/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
