services:
  ldap-account-manager:
    image: ghcr.io/ldapaccountmanager/lam:9.4
    container_name: ldap-account-manager
    restart: unless-stopped
    networks:
      caddy:
      ldap:
        aliases:
          - lam.${DOMAIN}
    depends_on:
      caddy:
        condition: service_started
      ldap:
        condition: service_started
    environment:
      LDAP_DOMAIN: ${LDAP_DOMAIN}
      LDAP_BASE_DN: ${LDAP_BASE_DN}
      LDAP_USER: cn=admin,${LDAP_BASE_DN}
      LDAP_PASSWORD: ${LDAP_ADMIN_PASSWORD}
      LAM_PASSWORD: ${STACK_ADMIN_PASSWORD}
      LAM_SKIP_PRECONFIGURE: "true"
      LAM_LANG: en_US
    volumes:
      - ./configs/lam/config.cfg:/etc/ldap-account-manager/config.cfg:ro
      - ./configs/lam/lam.conf:/etc/ldap-account-manager/config/lam.conf:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/lam/templates/login.php"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
