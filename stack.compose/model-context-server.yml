services:
  model-context-server:
    image: datamancy/model-context-server:local-build
    build:
      context: .
      dockerfile: ./stack.containers/model-context-server/Dockerfile
    container_name: model-context-server
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    networks:
      ai:
        aliases:
          - model-context-server.${DOMAIN}
      mariadb:
        aliases:
          - model-context-server.${DOMAIN}
      qdrant:
        aliases:
          - model-context-server.${DOMAIN}
      ldap:
        aliases:
          - model-context-server.${DOMAIN}
      docker-proxy:
        aliases:
          - model-context-server.${DOMAIN}
    depends_on:
      litellm:
        condition: service_started
      mariadb:
        condition: service_started
    environment:
      LITELLM_BASE_URL: http://litellm:4000
      MARIADB_OBSERVER_USER: agent_observer
      MARIADB_OBSERVER_PASSWORD: ${MARIADB_AGENT_PASSWORD}
      MARIADB_HOST: mariadb
      MARIADB_PORT: 3306
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6334
      QDRANT_OBSERVER_API_KEY: ${QDRANT_AGENT_API_KEY}
      LDAP_OBSERVER_DN: cn=agent_observer,${LDAP_BASE_DN}
      LDAP_HOST: ldap
      LDAP_PORT: 389
      LDAP_BASE_DN: ${LDAP_BASE_DN}
      SEARCH_SERVICE_URL: http://search-service:8098
      AUTHELIA_JWKS_URL: http://authelia:9091/jwks.json
      AUTHELIA_JWT_ISSUER: ${AUTHELIA_URL}
      AUTHELIA_JWT_AUDIENCE: ${TOOLSERVER_JWT_AUDIENCE:-model-context-server}
      TOOLSERVER_AUTH_REQUIRED: "true"
      TOOLSERVER_TRUST_IDENTITY_HEADERS: "false"
      TOOLSERVER_ENABLE_ADMIN_ENDPOINTS: "false"
      TOOLSERVER_ADMIN_ROLES: "admins"
      # MCP authn/authz: require LDAP-backed identity headers for tool methods.
      MCP_AUTH_REQUIRED: "true"
      MCP_LIST_ALLOWED_ROLES: "users,admins,agents"
      MCP_DEFAULT_TOOL_ALLOWED_ROLES: "admins"
      MCP_ADMIN_TOOL_PATTERNS: "docker_*,host_*,ssh_*,vm_*"
      MCP_TOOL_ROLE_RULES: "normalize_whitespace=users|admins|agents;uuid_generate=users|admins|agents;retrieve_stack_context=users|admins|agents;get_stack_knowledge_categories=users|admins|agents;llm_embed_text=users|admins|agents;llm_chat_completion=admins|agents;query_mariadb=admins|agents;search_qdrant=admins|agents;search_ldap=admins|agents;semantic_search=admins|agents;http_get=admins|agents;browser_dom=admins|agents;browser_screenshot=admins|agents;browser_login=admins|agents;host_exec_readonly=admins|agents;ssh_exec_whitelisted=admins|agents;docker_list_containers=admins|agents;docker_logs=admins|agents;docker_stats=admins|agents;docker_inspect=admins|agents;docker_health_wait=admins|agents;docker_container_list=admins|agents;docker_restart=admins;docker_exec=admins;docker_compose_restart=admins;docker_container_create=admins;docker_container_stop=admins;docker_container_remove=admins;docker_container_exec=admins;docker_ssh_key_get=admins"
      MCP_GRANT_HOST_NETWORK_HTTP: "true"
      MCP_GRANT_HOST_NETWORK_SSH: "true"
      SHADOW_ACCOUNTS_SECRETS_DIR: /run/secrets/datamancy
      TOOLSERVER_HTTP_ALLOWED_HOSTS: "*.${DOMAIN},${DOMAIN},prompt-server,playwright,litellm,authelia,caddy"
      TOOLSERVER_HTTP_ALLOW_PRIVATE_NETS: "false"
      TOOLSERVER_SSH_HOST: ${STACK_SSH_HOST:-latium.local}
      TOOLSERVER_SSH_USER: ${STACK_SSH_USER:-stackops}
      TOOLSERVER_SSH_KEY_PATH: /app/known_hosts_data/keys/stackops_ed25519
      TOOLSERVER_SSH_KNOWN_HOSTS: /app/known_hosts_data/known_hosts
      TOOLSERVER_TOOL_EXEC_TIMEOUT_MS: 300000
      TOOLSERVER_ALLOW_CAPS: "host.network.http,host.network.ssh,host.shell.read,host.docker.inspect,host.docker.write,docker.container.create,docker.container.manage,ssh.keymanagement"
      DOCKER_HOST: tcp://docker-socket-proxy:2375
      DOCKER_HOST_ISOLATED: tcp://docker-vm-socket-proxy:2375
      ISOLATED_DOCKER_VM_DOCKER_HOST: tcp://docker-vm-socket-proxy:2375
    volumes:
      - model_context_server_known_hosts:/app/known_hosts_data:ro
      - model_context_server_scripts:/app/scripts:ro
      - ${SHADOW_ACCOUNTS_HOST_DIR}:/run/secrets/datamancy:ro
    group_add:
      - "988"
    healthcheck:
      test:
        - CMD-SHELL
        - |
          wget --quiet --tries=1 --timeout=3 --spider http://localhost:8081/health && \
          wget --quiet --tries=1 --timeout=3 --header='Content-Type: application/json' \
            --post-data='{"jsonrpc":"2.0","id":"health","method":"ping","params":{}}' \
            -O- http://localhost:8081/mcp | grep -q '"jsonrpc":"2.0"'
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
