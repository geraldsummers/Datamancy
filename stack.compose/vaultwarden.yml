services:
  vaultwarden:
    image: vaultwarden/server:testing
    container_name: vaultwarden
    restart: unless-stopped
    networks:
      caddy:
        aliases:
          - vaultwarden.${DOMAIN}
          - app.vaultwarden.${DOMAIN}
      postgres:
        aliases:
          - vaultwarden.${DOMAIN}
          - app.vaultwarden.${DOMAIN}
      mailserver:
        aliases:
          - vaultwarden.${DOMAIN}
          - app.vaultwarden.${DOMAIN}
      authelia:
        aliases:
          - vaultwarden.${DOMAIN}
          - app.vaultwarden.${DOMAIN}
    depends_on:
      caddy:
        condition: service_started
      postgres:
        condition: service_started
      mailserver:
        condition: service_started
    environment:
      DOMAIN: https://app.vaultwarden.${DOMAIN}
      SIGNUPS_ALLOWED: true
      SIGNUPS_VERIFY: false
      SIGNUPS_DOMAINS_WHITELIST: ${MAIL_DOMAIN},datamancy.test
      INVITATIONS_ALLOWED: true
      SHOW_PASSWORD_HINT: false
      SSO_ENABLED: true
      SSO_ONLY: true
      SSO_AUTHORITY: https://auth.${DOMAIN}
      SSO_CLIENT_ID: vaultwarden
      SSO_SCOPES: openid email profile
      SSO_CALLBACK_PATH: /identity/connect/oidc-signin
      SSO_SIGNUPS_MATCH_EMAIL: true
      SSO_ALLOW_UNKNOWN_EMAIL_VERIFICATION: true
      SMTP_HOST: mailserver
      SMTP_FROM: vaultwarden@${MAIL_DOMAIN}
      SMTP_PORT: 587
      SMTP_SECURITY: starttls
      SMTP_USERNAME: vaultwarden@${MAIL_DOMAIN}
      SSL_CERT_FILE: /certs/pki/authorities/local/root.crt
      ROCKET_TLS_INSECURE_SKIP_VERIFICATION: "true"
    volumes:
      - vaultwarden_data:/data
      - caddy_certs:/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/alive || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
