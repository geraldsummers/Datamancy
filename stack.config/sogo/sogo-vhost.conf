<VirtualHost *:80>
    ServerName sogo.{{DOMAIN}}
    ErrorLog  syslog:local1
    CustomLog "|/usr/bin/logger -t apache -p local1.info" "%h → %{Authorization}i"
    RequestHeader set X-Forwarded-Proto "https" env=HTTPS
    SetEnvIf X-Forwarded-Proto "https" HTTPS=on

    LimitRequestBody 0

    Alias /img/ /usr/lib/GNUstep/SOGo/WebServerResources/img/
    Alias /js/  /usr/lib/GNUstep/SOGo/WebServerResources/js/
    Alias /css/ /usr/lib/GNUstep/SOGo/WebServerResources/css/

    <Directory /usr/lib/GNUstep/SOGo/WebServerResources>
        Require all granted
        ExpiresActive  On
        ExpiresDefault "access plus 1 year"
    </Directory>

    Alias /SOGo.woa/WebServerResources/ /usr/lib/GNUstep/SOGo/WebServerResources/
    Alias /SOGo/WebServerResources/     /usr/lib/GNUstep/SOGo/WebServerResources/

    <Directory /usr/lib/GNUstep/SOGo/>
        Require all granted
    </Directory>

    Header always set Referrer-Policy        "same-origin"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options        "SAMEORIGIN"
    Header always set X-Robots-Tag           "none"
    Header set    Cache-Control              "max-age=0, no-cache, no-store"

    SetEnv proxy-sendchunked 1
    UnsetEnv proxy-sendcl

    ProxyRequests     Off
    ProxyPreserveHost On
    SetEnv proxy-nokeepalive 1

    ProxyPass        /SOGo http://127.0.0.1:20000/SOGo retry=60 connectiontimeout=5 timeout=360 nocanon
    ProxyPassReverse /SOGo http://127.0.0.1:20000/SOGo

    ProxyPass        /Microsoft-Server-ActiveSync http://127.0.0.1:20000/SOGo/Microsoft-Server-ActiveSync nocanon
    ProxyPassReverse /Microsoft-Server-ActiveSync http://127.0.0.1:20000/SOGo/Microsoft-Server-ActiveSync

    SetEnvIfNoCase ^Authorization$ "(.+)" HTTP_AUTHORIZATION=$1
    RequestHeader set "x-webobjects-authorization" "%{HTTP_AUTHORIZATION}e" env=HTTP_AUTHORIZATION
    RequestHeader set "x-webobjects-remote-user"   "%{REMOTE_USER}e"       env=REMOTE_USER

    RequestHeader set "x-webobjects-server-port" "443"
    SetEnvIf Host (.*) HTTP_HOST=$1
    RequestHeader set "x-webobjects-server-name" "%{HTTP_HOST}e" env=HTTP_HOST
    RequestHeader set "x-webobjects-server-url"  "https://%{HTTP_HOST}e" env=HTTP_HOST

    RewriteEngine On
    RewriteRule ^/\.well-known/caldav/?$  /SOGo/dav [R=301,L]
    RewriteRule ^/\.well-known/carddav/?$ /SOGo/dav [R=301,L]

    RewriteCond %{REQUEST_URI} !^/SOGo($|/)                     [NC]
    RewriteCond %{REQUEST_URI} !^/SOGo\.woa                    [NC]
    RewriteCond %{REQUEST_URI} !^/Microsoft-Server-ActiveSync  [NC]
    RewriteCond %{REQUEST_URI} !^/(img|js|css)/                [NC]
    RewriteCond %{REQUEST_URI} !^/\.well-known/                [NC]
    RewriteCond %{REQUEST_URI} !^/favicon\.ico$                [NC]
    RewriteRule ^/(.*)$  /SOGo/  [R=302,L]
</VirtualHost>
