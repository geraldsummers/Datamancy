{
  WOPort = "127.0.0.1:20000";

  SOGoLanguage = English;
  SOGoTimeZone = "UTC";
  SOGoMailDomain = "{{MAIL_DOMAIN}}";

  SOGoProfileURL = "postgresql://sogo:{{POSTGRES_SOGO_PASSWORD}}@postgres:5432/sogo/sogo_user_profile?sslmode=disable";
  OCSFolderInfoURL = "postgresql://sogo:{{POSTGRES_SOGO_PASSWORD}}@postgres:5432/sogo/sogo_folder_info?sslmode=disable";
  OCSAclURL = "postgresql://sogo:{{POSTGRES_SOGO_PASSWORD}}@postgres:5432/sogo/sogo_acl?sslmode=disable";
  OCSSessionsFolderURL = "postgresql://sogo:{{POSTGRES_SOGO_PASSWORD}}@postgres:5432/sogo/sogo_sessions_folder?sslmode=disable";
  OCSStoreURL = "postgresql://sogo:{{POSTGRES_SOGO_PASSWORD}}@postgres:5432/sogo/sogo_store?sslmode=disable";
  OCSAdminURL = "postgresql://sogo:{{POSTGRES_SOGO_PASSWORD}}@postgres:5432/sogo/sogo_admin?sslmode=disable";
  OCSOpenIdURL = "postgresql://sogo:{{POSTGRES_SOGO_PASSWORD}}@postgres:5432/sogo/sogo_openid?sslmode=disable";
  SOGoMemcachedHost = "memcached:11211";

  SOGoIMAPServer = "imaps://mailserver:993";
  NGImap4AuthMechanism = xoauth2;
  SOGoSieveServer = "sieve://mailserver:4190";

  SOGoMailingMechanism = smtp;
  SOGoSMTPServer = "smtp://mailserver:587/?tls=YES&tlsVerifyMode=allowInsecureLocalhost";
  SOGoSMTPAuthenticationType = xoauth2;

  SOGoAuthenticationType = openid;
  SOGoOpenIdConfigUrl = "https://auth.{{DOMAIN}}/.well-known/openid-configuration";
  SOGoOpenIdClient = "sogo";
  SOGoOpenIdClientSecret = "{{SOGO_OAUTH_SECRET}}";
  SOGoOpenIdScope = "openid profile email";
  SOGoOpenIdEmailParam = "email";
  SOGoOpenIdEnableRefreshToken = YES;
  SOGoOpenIdLogoutEnabled = YES;
  SOGoXSRFValidationEnabled = NO;
  SOGoForceExternalLoginWithEmail = YES;

  SOGoUserSources = (
    {
      type = ldap;
      id = users;
      canAuthenticate = YES;
      isAddressBook = YES;
      displayName = "LDAP";
      hostname = "ldap://ldap:389";
      baseDN = "ou=users,{{LDAP_BASE_DN}}";
      bindDN = "cn=admin,{{LDAP_BASE_DN}}";
      bindPassword = "{{LDAP_ADMIN_PASSWORD}}";
      filter = "(&(objectClass=inetOrgPerson)(mail=*))";
      IDFieldName = mail;
      UIDFieldName = mail;
      CNFieldName = cn;
      mailFieldNames = (mail);
    }
  );
}
