default_config:

http:
  ip_ban_enabled: true
  login_attempts_threshold: 5

frontend:
  themes: !include_dir_merge_named themes

recorder:
  db_url: !env_var HOMEASSISTANT_DB_URL
  auto_purge: true
  purge_keep_days: 30

history:

logbook:

homeassistant:
  auth_providers:
    - type: ldap
      ldap_host: !env_var LDAP_HOST
      ldap_port: 389
      ldap_base_dn: !env_var LDAP_BASE_DN
      ldap_bind_dn: !env_var LDAP_BIND_DN
      ldap_bind_password: !env_var LDAP_BIND_PASSWORD
      ldap_user_filter: !env_var LDAP_USER_FILTER

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml
