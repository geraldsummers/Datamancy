default_config:

http:
  # trusted_networks auth cannot operate when requests are marked as coming
  # from a trusted proxy. Keep proxy forwarding disabled so HA sees Caddy's
  # container IP directly and can apply trusted_networks bypass.
  use_x_forwarded_for: false
  ip_ban_enabled: false
  login_attempts_threshold: 5

frontend:
  themes: !include_dir_merge_named themes

recorder:
  db_url: !env_var HOMEASSISTANT_DB_URL
  auto_purge: true
  purge_keep_days: 30

history:

logbook:

homeassistant:
  auth_providers:
    - type: trusted_networks
      trusted_networks:
        - 172.26.0.0/24
        - 172.16.0.0/12
        - 192.168.48.0/24
      allow_bypass_login: true

    - type: homeassistant

    - type: command_line
      command: /config/auth_ldap.py
      args: ["--username", "{{ username }}", "--password", "{{ password }}"]
      meta: true

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml
