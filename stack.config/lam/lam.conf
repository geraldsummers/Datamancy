{
  "ServerURL": "ldap://ldap:389",
  "useTLS": "no",
  "followReferrals": "false",
  "pagedResults": "false",
  "Admins": "cn=admin,{{LDAP_BASE_DN}}",
  "Passwd": "{{LDAP_ADMIN_PASSWORD}}",
  "treeSuffix": "{{LDAP_BASE_DN}}",
  "defaultLanguage": "en_US",
  "timeZone": "America/New_York",
  "activeTypes": "user,group",
  "typeSettings": {
    "suffix_user": "ou=users,{{LDAP_BASE_DN}}",
    "attr_user": "#uid;#givenName;#sn;#mail",
    "modules_user": "inetOrgPerson,posixAccount,shadowAccount",
    "suffix_group": "ou=groups,{{LDAP_BASE_DN}}",
    "attr_group": "#cn;#member",
    "modules_group": "groupOfNames"
  },
  "loginMethod": "search",
  "loginSearchSuffix": "{{LDAP_BASE_DN}}",
  "loginSearchFilter": "uid=%USER%",
  "loginSearchDN": "cn=admin,{{LDAP_BASE_DN}}",
  "loginSearchPassword": "{{LDAP_ADMIN_PASSWORD}}",
  "httpAuthentication": "true"
}
